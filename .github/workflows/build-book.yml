name: Build Event Study Book
on:
  push:
    branches: [main]
    paths:
      - 'event_study/**'
      - 'book/**'
      - '_quarto.yml'
      - 'index.qmd'
      - 'event_study_plotter.html'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.4.554'
      - name: Generate book from JSONs
        run: python book/generate_book.py
      - name: Render Quarto book
        run: quarto render
      - name: Copy event study plotter to site
        run: cp event_study_plotter.html _site/event_study_plotter.html
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
